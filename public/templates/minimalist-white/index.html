<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Thiệp Mời Đám Cưới</title>
<meta property="og:title" id="og-title" content="Thiệp Mời Đám Cưới">
<meta property="og:image" id="og-image" content="">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--p:#2d6a4f;--text:#1c1c1e;--muted:#6e6e73;--bg:#fafafa;--white:#ffffff;--border:#e5e5ea}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}

/* HERO */
.hero{min-height:100vh;position:relative;display:flex;align-items:center;justify-content:center;background:#fafafa}
.hero-img{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.08}
.hero-content{position:relative;z-index:2;text-align:center;padding:120px 40px 80px;max-width:700px;margin:0 auto}
.hero-line{width:60px;height:1px;background:var(--p);margin:0 auto 30px}
.couple-names{font-family:'Great Vibes',cursive;font-size:clamp(4rem,10vw,7rem);color:var(--p);line-height:1.1;margin-bottom:8px}
.and{display:block;font-family:'Inter',sans-serif;font-size:.9rem;font-weight:300;letter-spacing:6px;text-transform:uppercase;color:var(--muted);margin:12px 0}
.wedding-date{font-family:'Playfair Display',serif;font-size:clamp(1rem,2vw,1.3rem);color:var(--muted);letter-spacing:4px;margin-bottom:40px}
.btn-hero{display:inline-block;border:1px solid var(--p);color:var(--p);padding:12px 36px;font-size:.82rem;font-weight:500;letter-spacing:2px;text-transform:uppercase;text-decoration:none;transition:all .3s}
.btn-hero:hover{background:var(--p);color:white}

/* SECTIONS */
section{padding:100px 5%}
.container{max-width:900px;margin:0 auto}
.section-eyebrow{font-size:.7rem;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--p);margin-bottom:12px;text-align:center}
.section-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3rem);text-align:center;color:var(--text);margin-bottom:50px;font-weight:400}

/* INVITATION */
.invitation{background:white}
.inv-inner{max-width:640px;margin:0 auto;text-align:center}
.inv-icon{width:48px;margin:0 auto 30px;opacity:.4}
.inv-quote{font-family:'Playfair Display',serif;font-style:italic;font-size:1.15rem;color:var(--text);margin-bottom:18px;line-height:1.7}
.inv-msg{color:var(--muted);font-size:.93rem;line-height:1.9;margin-bottom:40px}
.parents{display:flex;gap:40px;justify-content:center;margin-top:40px;padding-top:40px;border-top:1px solid var(--border)}
.parent-col{text-align:center;flex:1;max-width:200px}
.parent-label{font-size:.68rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--p);margin-bottom:14px}
.parent-name{font-family:'Playfair Display',serif;font-size:.97rem;color:var(--text);line-height:1.6}
@media(max-width:500px){.parents{flex-direction:column;align-items:center}}

/* COUNTDOWN */
.countdown{background:var(--bg)}
.count-row{display:flex;gap:50px;justify-content:center;flex-wrap:wrap}
.time-box{text-align:center}
.time-num{font-family:'Playfair Display',serif;font-size:clamp(3rem,7vw,5rem);color:var(--p);display:block;line-height:1}
.time-label{font-size:.68rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-top:10px}

/* EVENTS */
.events{background:white}
.ev-list{display:flex;flex-direction:column;gap:2px;max-width:650px;margin:0 auto}
.ev-item{display:flex;align-items:flex-start;gap:25px;padding:30px;border-bottom:1px solid var(--border)}
.ev-item:last-child{border-bottom:none}
.ev-num{font-family:'Playfair Display',serif;font-size:2rem;color:var(--p);opacity:.25;line-height:1;flex-shrink:0;width:50px;text-align:center}
.ev-name{font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:10px}
.ev-detail{font-size:.88rem;color:var(--muted);line-height:1.7}
.ev-detail span{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.ev-detail i{color:var(--p);width:14px}
.btn-map{display:inline-flex;align-items:center;gap:6px;color:var(--p);font-size:.78rem;font-weight:500;letter-spacing:1px;text-decoration:none;border-bottom:1px solid var(--p);padding-bottom:1px;margin-top:12px}

/* GALLERY */
.gallery{background:var(--bg)}
.photo-grid{columns:3;gap:4px;max-width:1000px;margin:0 auto}
@media(max-width:640px){.photo-grid{columns:2}}
.photo-item{break-inside:avoid;overflow:hidden;margin-bottom:4px}
.photo-item img{width:100%;display:block;transition:transform .5s ease}
.photo-item:hover img{transform:scale(1.03)}

/* RSVP */
.rsvp{background:white}
.rsvp-inner{max-width:480px;margin:0 auto}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:.75rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.fg input,.fg select,.fg textarea{width:100%;padding:12px 16px;border:1px solid var(--border);background:var(--bg);font-family:'Inter',sans-serif;font-size:.9rem;color:var(--text);transition:border-color .2s;outline:none}
.fg input:focus,.fg textarea:focus{border-color:var(--p)}
.fg textarea{resize:none}
.btn-submit{display:block;width:100%;padding:14px;background:var(--p);color:white;font-family:'Inter',sans-serif;font-size:.82rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;border:none;cursor:pointer;transition:opacity .2s}
.btn-submit:hover{opacity:.85}

/* FOOTER */
footer{background:white;border-top:1px solid var(--border);text-align:center;padding:80px 20px}
.footer-names{font-family:'Great Vibes',cursive;font-size:4rem;color:var(--p);line-height:1}
.footer-sub{font-size:.75rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-top:18px}

/* DRESS CODE & GUESTBOOK */
.dress-colors{display:flex;justify-content:center;gap:15px;margin-bottom:20px}
.dress-swatch{width:50px;height:50px;border-radius:50%;border:1px solid var(--border);box-shadow:0 2px 10px rgba(0,0,0,.05)}
.dress-note{text-align:center;color:var(--muted);font-size:0.95rem}
.gb-entries{max-height:400px;overflow-y:auto;margin-top:30px;text-align:left;padding-right:8px}
.gb-entries::-webkit-scrollbar{width:3px}
.gb-entries::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.gb-entry{background:var(--bg);padding:15px 20px;border-radius:0;border-left:2px solid var(--p);margin-bottom:12px}
.gb-entry-name{color:var(--text);font-family:'Inter',sans-serif;font-size:0.95rem;margin-bottom:6px;font-weight:600}
.gb-entry-msg{color:var(--muted);font-size:0.88rem}
.gb-emoji{font-size:1.1rem;margin-right:8px}
.emoji-row{display:flex;gap:8px;margin-bottom:15px}
.emoji-btn{background:white;border:1px solid var(--border);border-radius:4px;width:32px;height:32px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
.emoji-btn.sel{border-color:var(--p);background:rgba(45,106,79,.05)}

/* MUSIC */
#music-player{position:fixed;bottom:25px;right:25px;z-index:999;display:none}
.music-btn-min{width:44px;height:44px;border-radius:50%;border:1px solid var(--border);background:white;color:var(--p);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.08);transition:all .2s}
.music-btn-min:hover{border-color:var(--p)}

/* FADE */
.fade-in{opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease}
.fade-in.visible{opacity:1;transform:none}
</style>
  <link rel="icon" href="/favicon.png" type="image/png">
</head>
<body>

<div id="music-player">
  <button class="music-btn-min" onclick="toggleMusic()"><i class="fa-solid fa-music"></i></button>
  <audio id="bg-audio" loop></audio>
</div>

<section class="hero" id="home">
  <div class="hero-img" id="hero-bg"></div>
  <div class="hero-content">
    <div class="hero-line"></div>
    <h1 class="couple-names"><span id="hero-groom">Chú Rể</span><span class="and">×</span><span id="hero-bride">Cô Dâu</span></h1>
    <p class="wedding-date" id="hero-date"></p>
    <a href="#invitation" class="btn-hero">Xem Lời Mời</a>
  </div>
</section>

<section class="invitation" id="invitation">
  <div class="container fade-in">
    <div class="section-eyebrow">Trân Trọng Kính Mời</div>
    <div class="inv-inner">
      <div class="inv-icon">💍</div>
      <div class="inv-quote" id="inv-quote"></div>
      <div class="inv-msg" id="inv-msg"></div>
      <div class="parents">
        <div class="parent-col">
          <div class="parent-label">Nhà Trai</div>
          <div class="parent-name" id="gf"></div>
          <div class="parent-name" id="gm"></div>
          <div id="g-address-display" style="font-size:0.8rem;color:var(--muted);margin-top:10px;display:none;"></div>
          <a id="g-map-link" href="#" target="_blank" class="btn-map" style="display:none;font-size:0.75rem;margin-top:10px;justify-content:center"><i class="fa-solid fa-map-location-dot"></i> Bản đồ</a>
        </div>
        <div style="width:1px;background:var(--border)"></div>
        <div class="parent-col">
          <div class="parent-label">Nhà Gái</div>
          <div class="parent-name" id="bf"></div>
          <div class="parent-name" id="bm"></div>
          <div id="b-address-display" style="font-size:0.8rem;color:var(--muted);margin-top:10px;display:none;"></div>
          <a id="b-map-link" href="#" target="_blank" class="btn-map" style="display:none;font-size:0.75rem;margin-top:10px;justify-content:center"><i class="fa-solid fa-map-location-dot"></i> Bản đồ</a>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="fade-in" id="sec-countdown" style="padding:80px 5%;background:var(--bg)">
  <div class="container">
    <div class="section-eyebrow">Đếm Ngược</div>
    <div class="count-row" id="countdown">
      <div class="time-box"><span class="time-num" id="days">00</span><div class="time-label">Ngày</div></div>
      <div class="time-box"><span class="time-num" id="hours">00</span><div class="time-label">Giờ</div></div>
      <div class="time-box"><span class="time-num" id="minutes">00</span><div class="time-label">Phút</div></div>
      <div class="time-box"><span class="time-num" id="seconds">00</span><div class="time-label">Giây</div></div>
    </div>
  </div>
</section>

<section class="events fade-in" id="sec-events">
  <div class="container">
    <div class="section-eyebrow">Lịch Trình</div>
    <div class="ev-list" id="events-wrap"></div>
  </div>
</section>

<section class="gallery" id="sec-gallery">
  <div class="container fade-in">
    <div class="section-eyebrow">Khoảnh Khắc</div>
    <div class="photo-grid" id="gallery-wrap"></div>
  </div>
</section>

<section class="rsvp fade-in" id="sec-rsvp">
  <div class="container">
    <div class="section-eyebrow">Xác Nhận Tham Dự</div>
    <div class="rsvp-inner">
      <form id="rsvp-form">
        <div class="fg"><label>Tên Của Bạn</label><input type="text" id="rsvp-name" placeholder="Nguyen Van A" required></div>
        <div class="fg"><label>Số Điện Thoại</label><input type="tel" id="rsvp-phone" placeholder="09xx..."></div>
        <div class="fg"><label>Tham Dự</label>
          <select id="rsvp-att" required style="background:var(--bg);padding:12px 16px;border:1px solid var(--border);width:100%;font-family:'Inter',sans-serif;font-size:.9rem;color:var(--text);outline:none">
            <option value="" disabled selected>Vui lòng chọn</option>
            <option value="yes">Vâng, tôi sẽ đến ✓</option>
            <option value="no">Xin lỗi, tôi không đến được</option>
          </select>
        </div>
        <div class="fg"><label>Lời Chúc</label><textarea id="rsvp-msg" rows="3" placeholder="Lời chúc của bạn..."></textarea></div>
        <button type="submit" class="btn-submit">Gửi Xác Nhận</button>
      </form>
    </div>
  </div>
</section>

<section class="dresscode fade-in" id="sec-dresscode" style="display:none; padding:100px 5%; background:var(--bg)">
  <div class="container">
    <div class="section-eyebrow">Trang Phục</div>
    <div class="section-title" id="dc-title" style="margin-bottom:30px">Khuyến Khích</div>
    <div class="dress-colors" id="dc-colors"></div>
    <div class="dress-note" id="dc-note"></div>
  </div>
</section>

<section class="guestbook fade-in" id="sec-guestbook" style="display:none; padding:100px 5%; background:white">
  <div class="container" style="max-width:550px">
    <div class="section-eyebrow">Sổ Lưu Bút</div>
    <div class="section-title" style="margin-bottom:30px">Gửi Lời Chúc</div>
    <div class="fg"><label>Tên Của Bạn</label><input type="text" id="gb-name" placeholder="Tên của bạn"></div>
    <div class="fg"><label>Lời Chúc</label><textarea id="gb-msg" rows="3" placeholder="Lời chúc..."></textarea></div>
    <div class="emoji-row" id="emoji-row"></div>
    <button class="btn-submit" onclick="sendGuestbook()">Gửi Lời Chúc</button>
    <div class="gb-entries" id="gb-entries"></div>
  </div>
</section>

<footer>
  <div class="footer-names" id="footer-names">Cô Dâu & Chú Rể</div>
  <div class="footer-sub">Made with ❤️ by ThiepCuoiViet</div>
</footer>

<script>
(function(){
  const API = '/api';
  const slug=location.pathname.split('/').pop()||'demo';
  const MUSIC_MAP={canon:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3','a-thousand-years':'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3',perfect:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3','wedding-march':'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3'};

  fetch(`${API}/wedding-config/${slug}`).then(r=>r.json()).then(d=>{
    const gn=d.groom?.shortName||d.groom?.name||'Chú Rể';
    const bn=d.bride?.shortName||d.bride?.name||'Cô Dâu';
    document.getElementById('page-title').innerText=`Thiệp Mời | ${gn} & ${bn}`;
    if(d.heroImage){document.getElementById('hero-bg').style.backgroundImage=`url('${d.heroImage}')`;document.getElementById('og-image').content=d.heroImage;}
    document.getElementById('hero-groom').innerText=d.groom?.name||'Chú Rể';
    document.getElementById('hero-bride').innerText=d.bride?.name||'Cô Dâu';
    document.getElementById('hero-date').innerText=d.weddingDateText||'';
    document.getElementById('footer-names').innerText=`${gn} & ${bn}`;
    document.getElementById('inv-quote').innerText=d.invitation?.quote?`"${d.invitation.quote}"`:'';
    document.getElementById('inv-msg').innerText=d.invitation?.message||'';
    document.getElementById('gf').innerText=`Ông: ${d.groom?.father||''}`;document.getElementById('gm').innerText=`Bà: ${d.groom?.mother||''}`;
    if(d.groom?.address) { document.getElementById('g-address-display').innerText=d.groom.address; document.getElementById('g-address-display').style.display='block'; }
    if(d.groom?.mapUrl) { document.getElementById('g-map-link').href=d.groom.mapUrl; document.getElementById('g-map-link').style.display='inline-flex'; }
    document.getElementById('bf').innerText=`Ông: ${d.bride?.father||''}`;document.getElementById('bm').innerText=`Bà: ${d.bride?.mother||''}`;
    if(d.bride?.address) { document.getElementById('b-address-display').innerText=d.bride.address; document.getElementById('b-address-display').style.display='block'; }
    if(d.bride?.mapUrl) { document.getElementById('b-map-link').href=d.bride.mapUrl; document.getElementById('b-map-link').style.display='inline-flex'; }

    const ew=document.getElementById('events-wrap');let i=1;
    (d.events||[]).forEach(ev=>{ew.innerHTML+=`<div class="ev-item"><div class="ev-num">0${i++}</div><div><div class="ev-name">${ev.type}</div><div class="ev-detail"><span><i class="fa-regular fa-clock"></i>${ev.time||''} · ${ev.date||''}</span><span><i class="fa-solid fa-location-dot"></i>${ev.locationName||''}</span><span style="padding-left:22px">${ev.address||''}</span></div>${ev.mapUrl?`<a href="${ev.mapUrl}" target="_blank" class="btn-map"><i class="fa-solid fa-map"></i>Xem bản đồ</a>`:''}</div></div>`;});
    const gw=document.getElementById('gallery-wrap');
    (d.gallery||[]).forEach(u=>{gw.innerHTML+=`<div class="photo-item"><img src="${u}" loading="lazy" alt="Gallery"></div>`;});
    if(d.music?.enabled){const url=d.music.customUrl||(MUSIC_MAP[d.music.track]||'');if(url){document.getElementById('bg-audio').src=url;document.getElementById('music-player').style.display='block';document.addEventListener('click',()=>document.getElementById('bg-audio').play().catch(()=>{}),{once:true});}}
    if(d.weddingDate){const t=new Date(d.weddingDate).getTime();setInterval(()=>{const dist=t-Date.now();if(dist<0)return;const p=n=>String(Math.floor(n)).padStart(2,'0');document.getElementById('days').innerText=p(dist/86400000);document.getElementById('hours').innerText=p((dist%86400000)/3600000);document.getElementById('minutes').innerText=p((dist%3600000)/60000);document.getElementById('seconds').innerText=p((dist%60000)/1000);},1000);}
    // Dresscode
    if(d.sections?.dresscode) {
        document.getElementById('sec-dresscode').style.display='block';
        if(d.dresscode?.title) document.getElementById('dc-title').innerText=d.dresscode.title;
        if(d.dresscode?.note) document.getElementById('dc-note').innerText=d.dresscode.note;
        let cHtml='';
        if(d.dresscode?.color1) cHtml+=`<div class="dress-swatch" style="background:${d.dresscode.color1}"></div>`;
        if(d.dresscode?.color2) cHtml+=`<div class="dress-swatch" style="background:${d.dresscode.color2}"></div>`;
        document.getElementById('dc-colors').innerHTML=cHtml;
    }
    
    // Guestbook
    if(d.sections?.guestbook) {
        document.getElementById('sec-guestbook').style.display='block';
        renderEmojis();
        loadGuestbook();
    }

    const sec=d.sections||{};['countdown','events','gallery','rsvp'].forEach(k=>{const el=document.getElementById('sec-'+k);if(el&&sec[k]===false)el.style.display='none';});
    const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});},{threshold:.1});
    document.querySelectorAll('.fade-in').forEach(el=>obs.observe(el));
  }).catch(()=>{});

  window.toggleMusic=function(){const au=document.getElementById('bg-audio');au.paused?au.play():au.pause();};

  let selectedEmoji='💌';
  function renderEmojis(){
      const r=document.getElementById('emoji-row');r.innerHTML='';
      ['💌','✨','🌸','🌿','🤍'].forEach(e=>{
          const b=document.createElement('button');b.className='emoji-btn'+(e===selectedEmoji?' sel':'');b.innerText=e;
          b.onclick=()=>{selectedEmoji=e;renderEmojis();};
          r.appendChild(b);
      });
  }
  function loadGuestbook(){
      fetch(`${API}/guestbook/${slug}`).then(r=>r.json()).then(entries=>{
          const el=document.getElementById('gb-entries');
          if(!entries.length) { el.innerHTML='<div style="color:var(--muted);text-align:center;font-size:0.9rem">Chưa có lời chúc nào.</div>'; return; }
          el.innerHTML = entries.map(e=>`<div class="gb-entry"><div class="gb-entry-name"><span class="gb-emoji">${e.emoji}</span>${e.name}</div><div class="gb-entry-msg">${e.message}</div></div>`).join('');
      });
  }
  window.sendGuestbook=function(){
      fetch(`${API}/guestbook/${slug}`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:document.getElementById('gb-name').value,message:document.getElementById('gb-msg').value,emoji:selectedEmoji})})
      .then(()=>{document.getElementById('gb-name').value='';document.getElementById('gb-msg').value='';loadGuestbook();});
  };

  document.getElementById('rsvp-form')?.addEventListener('submit',e=>{
    e.preventDefault();const btn=e.target.querySelector('button');btn.disabled=true;
    fetch(`${API}/rsvp/${slug}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:document.getElementById('rsvp-name').value,phone:document.getElementById('rsvp-phone').value,attendance:document.getElementById('rsvp-att').value,message:document.getElementById('rsvp-msg').value})})
    .then(r=>r.json()).then(()=>{document.getElementById('rsvp-form').innerHTML='<div style="text-align:center;padding:40px;color:var(--p)"><div style="font-size:2rem;margin-bottom:12px">✓</div><div>Cảm ơn bạn đã xác nhận!</div></div>';}).catch(()=>{btn.disabled=false;});
  });
})();
</script>
</body>
</html>
