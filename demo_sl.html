ài lòng\",\"step3Desc\":\"Chỉ thanh toán khi bạn thực sự thích. Thiệp hoạt động vĩnh viễn sau khi thanh toán.\",\"faq1Q\":\"Dùng thử miễn phí là gì?\",\"faq1A\":\"Khi bạn tạo và xuất bản thiệp, bạn sẽ được **dùng thử miễn phí 3 ngày** với đầy đủ tính năng. Trong thời gian này, bạn có thể chia sẻ thiệp cho khách mời xem thử.\\n\\nSau 3 ngày, nếu bạn hài lòng, chỉ cần thanh toán một lần duy nhất để giữ thiệp mãi mãi. Nếu không thích, bạn không mất gì cả!\",\"faq2Q\":\"Thiệp của mình sẽ online được bao lâu?\",\"faq2A\":\"**Vĩnh viễn!** Sau khi thanh toán, thiệp của bạn sẽ hoạt động mãi mãi. Không có phí duy trì hàng tháng hay hàng năm. Bạn thanh toán một lần và sở hữu thiệp trọn đời.\\n\\nThiệp sẽ trở thành kỷ niệm kỹ thuật số đẹp mà bạn có thể xem lại bất cứ lúc nào.\",\"faq3Q\":\"{price} bao gồm những gì?\",\"faq3A\":\"Với {price}, bạn sẽ nhận được trọn bộ tính năng:\\n\\n- Mời không giới hạn người\\n- Thiệp hoạt động vĩnh viễn\\n- Ghi tên người nhận trên thiệp\\n- Tải thiệp dạng ảnh\\n- Bản đồ chỉ đường Google Maps\\n- Album ảnh không giới hạn\\n- QR Code nhận mừng cưới\\n- Thống kê khách mời chi tiết\",\"faq4Q\":\"Có phải trả thêm phí hàng tháng không?\",\"faq4A\":\"**Không!** Bạn chỉ cần thanh toán một lần duy nhất. Không có phí ẩn, không có phí duy trì, không có phí gia hạn. Thiệp của bạn sẽ hoạt động vĩnh viễn mà không phải trả thêm bất kỳ chi phí nào.\",\"faq5Q\":\"Tại sao cần tạo nhiều thiệp cưới?\",\"faq5A\":\"Nhiều cặp đôi cần thiệp riêng cho từng nhóm khách mời khác nhau:\\n\\n- **Nhà trai \u0026 nhà gái:** Mỗi bên có thông tin tiệc, địa điểm và thời gian khác nhau.\\n- **Bạn bè \u0026 đồng nghiệp:** Thiệp phong cách trẻ trung, khác với thiệp gửi cho họ hàng.\\n- **Khách xa \u0026 khách gần:** Thiệp cho khách ở xa có thể thêm thông tin đặt phòng, di chuyển.\\n\\nThiệp thứ 2 trở đi chỉ **{returningPrice}** (giảm 50%), giúp bạn tiết kiệm khi cần nhiều thiệp.\",\"faq6Q\":\"Thanh toán rồi còn chỉnh sửa được không?\",\"faq6A\":\"**Được!** Sau khi thanh toán, bạn vẫn chỉnh sửa thoải mái:\\n\\n- Sửa thông tin cặp đôi, gia đình, ngày giờ, địa điểm\\n- Thay ảnh, thêm nhạc, cập nhật bản đồ\\n- Đổi sang mẫu thiệp khác (nội dung được giữ nguyên)\\n\\nMọi thay đổi cập nhật ngay trên link đã gửi, không cần gửi lại link mới cho khách mời.\",\"faq7Q\":\"Làm sao tạo thiệp thứ 2 nhanh nhất?\",\"faq7A\":\"Dùng tính năng **Nhân bản** trong trang quản lý. Nhân bản sẽ tạo thiệp mới với toàn bộ nội dung từ thiệp cũ (tên, ảnh, nhạc, bản đồ...), bạn chỉ cần sửa những thông tin khác biệt.\\n\\nRất tiện khi cần thiệp riêng cho nhà trai, nhà gái, chỉ cần đổi địa điểm và thời gian tiệc.\",\"faq8Q\":\"Thanh toán bằng cách nào?\",\"faq8A\":\"ChungDoi hỗ trợ thanh toán qua **chuyển khoản ngân hàng**. Khi bạn nhấn thanh toán, hệ thống sẽ tạo mã QR chuyển khoản. Bạn quét mã bằng app ngân hàng và thiệp được kích hoạt tự động trong vài giây.\\n\\nBạn có thể quét mã QR hoặc chuyển khoản thủ công bằng số tài khoản hiển thị trên màn hình. Hỗ trợ tất cả ngân hàng tại Việt Nam.\",\"faq8ACard\":\"ChungDoi hỗ trợ thanh toán quốc tế an toàn qua **Visa, Mastercard, PayPal, Apple Pay và Google Pay** (xử lý bởi Lemon Squeezy). Khi bạn nhấn thanh toán, hệ thống sẽ mở trang checkout bảo mật.\\n\\nSau khi thanh toán thành công, thiệp được kích hoạt tự động. Mọi giao dịch đều được mã hóa và bảo mật.\",\"faq9Q\":\"Chính sách hoàn tiền như thế nào?\",\"faq9A\":\"Vì bạn được **dùng thử miễn phí 3 ngày** với đầy đủ tính năng và chỉ trả phí khi đã hài lòng, nên sau khi thiệp được kích hoạt sẽ không hoàn tiền vì đổi ý (đây là sản phẩm số, giao ngay lập tức).\\n\\nChung Đôi vẫn hoàn tiền cho các trường hợp rõ ràng như **thu trùng, giao dịch không do bạn thực hiện, hoặc sự cố không thể khắc phục trong 7 ngày**. Gửi email tới **hello@chungdoi.com** kèm mã giao dịch trong vòng 30 ngày kể từ ngày thanh toán, Chung Đôi sẽ phản hồi trong 3 ngày làm việc.\",\"schemaName\":\"Thiệp cưới online - Chung Đôi\"},\"login\":{\"redirecting\":\"Đang chuyển hướng...\"},\"signup\":{\"redirecti iệp với giá đại lý, tiết kiệm đáng kể so với mua lẻ.\",\"benefit3Title\":\"Thiệp hoạt động vĩnh viễn\",\"benefit3Desc\":\"Mỗi thiệp tạo cho khách sẽ hoạt động vĩnh viễn, không giới hạn lượt xem hay khách mời.\",\"benefit4Title\":\"Gói thiệp không hết hạn\",\"benefit4Desc\":\"Mua bao nhiêu dùng bấy nhiêu, không áp lực thời gian. Gói thiệp nằm trong tài khoản mãi mãi.\",\"benefit5Title\":\"Được giới thiệu tới các cặp đôi\",\"benefit5Desc\":\"Tiệm của bạn xuất hiện trên trang tìm tiệm in thiệp cưới của Chung Đôi, tiếp cận các cặp đôi đang tìm chỗ in thiệp gần bạn, kèm link về website của bạn.\",\"processTitle\":\"Quy trình hợp tác\",\"step\":\"Bước {n}\",\"step1Title\":\"Kích hoạt đại lý\",\"step1Desc\":\"Bấm nút đăng ký trên trang này, đăng nhập và kích hoạt tài khoản đại lý ngay lập tức.\",\"step2Title\":\"Mua gói thiệp\",\"step2Desc\":\"Chọn gói phù hợp và thanh toán. Số thiệp sẽ được cộng vào tài khoản của bạn.\",\"step3Title\":\"Bàn giao tài khoản cho khách\",\"step3Desc\":\"Tạo tài khoản để khách tự làm thiệp. Khi khách cần hỗ trợ, bạn có thể vào tài khoản của khách để làm hộ.\",\"packagesTitle\":\"Các gói thiệp\",\"packagesSubtitle\":\"Mua theo gói, không hết hạn. Mỗi thiệp đều mang thương hiệu của bạn.\",\"packageUnit\":\"thiệp\",\"packagePopular\":\"Phổ biến\",\"packagesBrandNote\":\"Gắn thương hiệu của bạn lên mọi thiệp và để khách liên hệ hỗ trợ qua kênh của bạn. Bán hoặc tặng theo giá của bạn.\",\"featuresTitle\":\"Tính năng dành cho đại lý\",\"feature1Title\":\"Trang quản lý riêng\",\"feature1Desc\":\"Bảng điều khiển hiển thị số thiệp còn lại, danh sách khách hàng, và thiệp đã tạo.\",\"feature2Title\":\"Tạo tài khoản cho khách\",\"feature2Desc\":\"Tạo tài khoản nhanh cho khách bằng email. Khách nhận link đăng nhập tự động.\",\"feature3Title\":\"Quản lý tài khoản khách\",\"feature3Desc\":\"Truy cập tài khoản khách để hỗ trợ chỉnh sửa thiệp. Khách vẫn tự quản lý được.\",\"feature4Title\":\"Trung tâm tài nguyên bán hàng\",\"feature4Desc\":\"Trong trang quản lý đại lý có video thiệp demo, bài viết mẫu, banner, mockup và kịch bản tư vấn để bạn giới thiệu Chung Đôi nhanh hơn.\",\"feature5Title\":\"Hỗ trợ ưu tiên\",\"feature5Desc\":\"Đại lý được hỗ trợ ưu tiên qua Messenger khi cần trợ giúp.\",\"faqTitle\":\"Câu hỏi thường gặp\",\"faq1Q\":\"Thiệp đã thanh toán có thời hạn không?\",\"faq1A\":\"Thiệp đã kích hoạt sẽ hoạt động **vĩnh viễn**, không giới hạn lượt xem, không giới hạn khách mời.\",\"faq2Q\":\"Tôi có thể tạo thiệp thay cho khách không?\",\"faq2A\":\"Có. Quy trình chính là **tạo tài khoản cho khách** rồi gửi link đăng nhập để khách tự tạo và chỉnh sửa thiệp. Khi khách cần hỗ trợ, bạn có thể **trực tiếp vào tài khoản khách** để tạo hoặc chỉnh sửa thiệp giúp khách.\",\"faq3Q\":\"Khách hàng có tự quản lý thiệp được không?\",\"faq3A\":\"Được. Sau khi bạn tạo tài khoản, khách có thể tự đăng nhập để xem và chỉnh sửa thiệp của mình bất cứ lúc nào.\",\"faq4Q\":\"Gói thiệp có hạn sử dụng không?\",\"faq4A\":\"Không. Gói thiệp mua rồi sẽ nằm trong tài khoản đại lý, dùng khi nào cũng được, không hết hạn.\",\"faq5Q\":\"Làm sao để bắt đầu?\",\"faq5A\":\"Bấm nút **\\\"Đăng ký đại lý ngay\\\"** trên trang này. Nếu chưa có tài khoản, bạn sẽ được hướng dẫn đăng nhập trước. Sau khi đăng nhập, tài khoản đại lý sẽ được kích hoạt ngay lập tức.\",\"faq6Q\":\"Tôi có thể mua thêm thiệp không?\",\"faq6A\":\"Có. Bạn có thể mua thêm gói thiệp bất cứ lúc nào trực tiếp từ trang quản lý đại lý.\",\"faq7Q\":\"Thương hiệu của tôi hiển thị thế nào trên thiệp?\",\"faq7A\":\"Khi bạn thiết lập thương hiệu, chân thiệp hiển thị tên thương hiệu của bạn (kèm link) thay cho Chung Đôi, và nút \\\"Chat với chúng tôi\\\" mở Messenger của bạn. Mỗi thiệp thường mời khoảng 200 khách, nghĩa là khoảng 200 người nhìn thấy thương hiệu của bạn trên mỗi thiệp. Để trống thì thiệp giữ thương hiệu mặc định Chung Đôi.\",\"ctaTitle\":\"Bắt đầu hợp tác ngay\",\"ctaDesc\":\"Kích hoạt tài khoản đ��i lý chỉ trong vài giây.\",\"gotoDashboard\":\"Vào trang quản lý đại lý\",\"acti vừa nhận hoa hồng cảm ơn\",\"audience2Title\":\"Người hay được hỏi về cưới hỏi\",\"audience2Desc\":\"Bạn bè thường nhờ tư vấn về đám cưới? Chia sẻ link giới thiệu mỗi khi ai đó hỏi về thiệp cưới\",\"audience3Title\":\"KOL / Influencer\",\"audience3Desc\":\"Review và chia sẻ trải nghiệm tạo thiệp cưới online, nhận hoa hồng từ mỗi đơn hàng qua link của bạn\",\"audience4Title\":\"Content Creator\",\"audience4Desc\":\"Tạo nội dung về cưới hỏi trên TikTok, Instagram, YouTube — gắn link giới thiệu trong bio\",\"howTitle\":\"Cách thức hoạt động\",\"step1Title\":\"Đăng ký miễn phí\",\"step1Desc\":\"Chỉ cần 1 bước, nhận mã giới thiệu riêng ngay lập tức.\",\"step2Title\":\"Chia sẻ cho bạn bè\",\"step2Desc\":\"Gửi link giới thiệu khi bạn bè hỏi về thiệp cưới — họ được giảm 20% ngay.\",\"step3Title\":\"Bạn bè tạo thiệp\",\"step3Desc\":\"Bạn bè dùng mã của bạn để mua thiệp với giá ưu đãi.\",\"step4Title\":\"Nhận hoa hồng cảm ơn\",\"step4Desc\":\"Mỗi khi bạn bè thanh toán, bạn nhận 20-30% hoa hồng vào tài khoản ngân hàng.\",\"tiersTitle\":\"Hoa hồng theo cấp bậc\",\"tiersSubtitle\":\"Càng giới thiệu nhiều, hoa hồng càng tăng\",\"tierBronze\":\"Đồng\",\"tierSilver\":\"Bạc\",\"tierGold\":\"Vàng\",\"tierReferrals1\":\"0-2 giới thiệu\",\"tierReferrals2\":\"3-4 giới thiệu\",\"tierReferrals3\":\"5+ giới thiệu\",\"perInvitation\":\"Mỗi thiệp (200k):\",\"exampleTitle\":\"Ví dụ thu nhập:\",\"exampleDesc\":\"Nếu bạn giới thiệu được 10 khách hàng mua 1 thiệp (200k) mỗi tháng, bạn sẽ nhận {amount} hoa hồng (cấp Vàng - 30%).\",\"faqTitle\":\"Câu hỏi thường gặp\",\"faq1Q\":\"Tôi có cần trả phí gì không?\",\"faq1A\":\"Hoàn toàn miễn phí! Không có phí đăng ký, phí duy trì, hay bất kỳ chi phí nào. Bạn chỉ cần chia sẻ link giới thiệu và nhận hoa hồng khi bạn bè mua thiệp.\",\"faq2Q\":\"Mã giới thiệu của tôi trông như thế nào?\",\"faq2A\":\"Khi đăng ký, hệ thống sẽ tự động tạo mã giới thiệu từ tên của bạn (ví dụ: ngochan, minhphat). Bạn có thể đổi mã bất cứ lúc nào trong trang quản lý.\",\"faq3Q\":\"Bạn bè tôi được lợi gì?\",\"faq3A\":\"Bạn bè dùng mã giới thiệu của bạn sẽ được giảm 20% khi tạo thiệp cưới. Bạn giúp họ tiết kiệm, đồng thời nhận hoa hồng cảm ơn từ Chung Đôi!\",\"faq4Q\":\"Khi nào tôi nhận được hoa hồng?\",\"faq4A\":\"Hoa hồng được tính ngay khi bạn bè thanh toán thành công. Thanh toán định kỳ hàng tháng vào tài khoản ngân hàng bạn đã đăng ký.\",\"faq5Q\":\"Bạn bè mua thiệp thứ hai thì sao?\",\"faq5A\":\"Từ thiệp thứ hai trở đi, bạn bè đã được giảm 50% (chỉ còn 99k). Mã giới thiệu vẫn áp dụng thêm 20% trên giá này — bạn bè chỉ trả khoảng 79k, và bạn vẫn nhận hoa hồng 20-30% (ví dụ: 16-24k/thiệp).\",\"faq6Q\":\"Tôi là studio/wedding planner, có chương trình nào phù hợp hơn không?\",\"faq6A\":\"Nếu bạn muốn mua sỉ và tự tạo thiệp cho khách, hãy tham gia chương trình Đại lý với giá ưu đãi hơn. Chương trình CTV phù hợp cho việc giới thiệu và nhận hoa hồng.\",\"ctaTitle\":\"Sẵn sàng bắt đầu?\",\"ctaDesc\":\"Giúp bạn bè sắp cưới tiết kiệm, đồng thời nhận hoa hồng cảm ơn từ Chung Đôi\",\"ctaDisclaimer\":\"Hoàn toàn miễn phí - Không ràng buộc - Hủy bất cứ lúc nào\",\"gotoDashboard\":\"Vào trang quản lý\",\"signupBtn\":\"Đăng ký cộng tác viên\",\"signupBtnLong\":\"Đăng ký cộng tác viên ngay\"},\"blogPage\":{\"subtitle\":\"Kinh nghiệm và xu hướng thiệp cưới mới nhất\",\"readingTime\":\"{minutes} phút đọc\",\"readingTimeDefault\":\"5 phút đọc\",\"noPosts\":\"Không có bài viết nào.\",\"viewAll\":\"Xem tất cả bài viết\",\"postCount\":\"{from} - {to} / {total} bài viết\",\"toolsTitle\":\"Công cụ hữu ích\",\"tool1Title\":\"Soạn tin nhắn mời cưới\",\"tool1Desc\":\"AI giúp soạn tin mời cưới chuẩn vai vế Việt Nam\",\"tool3Title\":\"Hướng dẫn tạo thiệp\",\"tool3Desc\":\"Tạo thiệp cưới online miễn phí trong 5 phút\",\"ctaTitle\":\"Sẵn sàng tạo thiệp cưới của riêng bạn?\",\"ctaDesc\":\"Khám phá hơn 50+ mẫu thiệp đẹp, dễ dàng tùy chỉnh và chia sẻ ngay lập tức\",\"ctaBtn\":\"Xem mẫu thiệp\",\"toc\":\"Mục lục\",\"viewTemplates\":\"Xem bộ sưu tập mẫu thiệp cưới\",\"back
