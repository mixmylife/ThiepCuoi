services:
  app:
    build: .
    container_name: thiepcuoiviet_app
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - HOME_INVITATION_SLUG=${HOME_INVITATION_SLUG:-huy-hihi-duyen}
      - PUBLIC_SITE_URL=${PUBLIC_SITE_URL:-https://thiepcuoihd.click}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
