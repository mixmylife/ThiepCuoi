services:
  app:
    build: .
    container_name: thiepcuoiviet_app
    restart: always
    ports:
      - "80:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - PRIMARY_INVITATION_SLUG=huy-hihi-duyen
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
